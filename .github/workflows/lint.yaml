name: Lint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    permissions:
      pull-requests: write
      contents: read

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup buildifier
        uses: jbajic/setup-buildifier@v1
        with:
          buildifier-version: 8.2.1

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          version: v0.11.0

      - name: Generate compile_commands.json
        run: |
          python3 scripts/regen_build_dir.py

      - name: Install clangd
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main"
          sudo apt-get update
          sudo apt-get install -y clangd-20
          sudo update-alternatives --install /usr/bin/clangd clangd /usr/bin/clangd-20 100

      - name: Install clangd-tidy
        run: pip install clangd-tidy

      - name: Run clangd-tidy
        run: |
          find src/ include/ -name '*.cc' -o -name '*.h' \
            | grep -v 'test/import_test' \
            | grep -v 'include/ex_actor/3rd_lib' \
            | xargs clangd-tidy \
              -p . \
              -f \
              --github \
              --fail-on-severity warn
