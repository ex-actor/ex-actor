comment:
  layout: "condensed_header, diff, condensed_files, condensed_footer"
  hide_project_coverage: false

coverage:
  status:
    project:
      default:
        target: 0%
        informational: true
    patch:
      default:
        target: 0%
        informational: true

ignore:
  - "test/**"
  - "include/ex_actor/3rd_lib/**"
  - "src/ex_actor/3rd_lib/**"
